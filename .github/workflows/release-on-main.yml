name: Release On Main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version/tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [[ -z "${VERSION:-}" ]]; then
            echo "Could not read version from package.json" >&2
            exit 1
          fi
          TAG="$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when tag already exists
        if: steps.version.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping release."

      - name: Setup Node.js
        if: steps.version.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        if: steps.version.outputs.exists != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps for Tauri
        if: steps.version.outputs.exists != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build CLI package
        if: steps.version.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          mkdir -p dist
          TARBALL="$(npm pack | tail -n1)"
          mv -f "$TARBALL" "dist/$TARBALL"
          echo "cli_tarball=dist/$TARBALL" >> "$GITHUB_ENV"

      - name: Build AppImage
        if: steps.version.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix ui ci
          npm --prefix ui run tauri:build
          APPIMAGE_PATH="$(ls -1 ui/src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)"
          cp -f "$APPIMAGE_PATH" "dist/Kitowall-${{ steps.version.outputs.version }}-x86_64.AppImage"
          echo "appimage=dist/Kitowall-${{ steps.version.outputs.version }}-x86_64.AppImage" >> "$GITHUB_ENV"

      - name: Create and push tag
        if: steps.version.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        if: steps.version.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            ${{ env.cli_tarball }}
            ${{ env.appimage }}
