name: Build UI AppImage

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/build-appimage.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Build AppImage
        run: npm --prefix ui run tauri:build

      - name: Resolve AppImage path
        id: appimage
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE_PATH="$(ls -1 ui/src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)"
          if [[ -z "${APPIMAGE_PATH:-}" ]]; then
            echo "AppImage was not generated" >&2
            exit 1
          fi
          echo "path=$APPIMAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitowall-ui-appimage
          path: ${{ steps.appimage.outputs.path }}
          if-no-files-found: error

      - name: Attach AppImage to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.appimage.outputs.path }}
