name: Build UI AppImage

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/build-appimage.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2t64 \
            patchelf

      - name: Install UI dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "ui/pnpm-lock.yaml" ]]; then
            corepack enable
            corepack pnpm -C ui install --frozen-lockfile
          elif [[ -f "ui/package-lock.json" ]]; then
            npm --prefix ui ci
          else
            npm --prefix ui install --no-audit --progress=false
          fi

      - name: Build AppImage
        run: npm --prefix ui exec -- tauri build --bundles appimage

      - name: Resolve AppImage path
        id: appimage
        shell: bash
        run: |
          set -euo pipefail
          find ui/src-tauri/target -maxdepth 8 -type f | sort
          APPIMAGE_PATH="$(find ui/src-tauri/target -type f -iname '*.appimage' | head -n1)"
          if [[ -z "${APPIMAGE_PATH:-}" ]]; then
            echo "AppImage was not generated" >&2
            exit 1
          fi
          echo "path=$APPIMAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitowall-ui-appimage
          path: ${{ steps.appimage.outputs.path }}
          if-no-files-found: error
