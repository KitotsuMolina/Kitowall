app-id: io.kitotsu.KitoWall
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: kitowall-ui

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
  env:
    npm_config_cache: /run/build/kitowall/flatpak-node/npm-cache
    npm_config_devdir: /run/build/kitowall/flatpak-node/cache/node-gyp
    npm_config_nodedir: /usr/lib/sdk/node20
    CARGO_NET_OFFLINE: "true"

finish-args:
  - --share=network
  - --share=ipc
  - --filesystem=home
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos
  - --socket=wayland
  - --socket=x11
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  - --env=LIBGL_ALWAYS_SOFTWARE=1
  - --env=GDK_BACKEND=wayland,x11
  - --env=KITOWALL_FLATPAK_INTEGRATED_RENDERCORE=1
  - --env=KITOWALL_FLATPAK_INTEGRATED_KITSUNE=1
  - --env=KITOWALL_LIVE_RUNNER_BIN=/app/bin/kitsune-rendercore

modules:
  - name: kitsune
    buildsystem: simple
    build-options:
      env:
        CARGO_NET_OFFLINE: "false"
    build-commands:
      - cargo build --release --locked --bins
      - install -d /app/share/kitsune
      - cp -a scripts /app/share/kitsune/
      - cp -a config /app/share/kitsune/
      - cp -a completions /app/share/kitsune/
      - install -Dm644 README.md /app/share/kitsune/README.md
      - install -Dm644 LICENSE.md /app/share/licenses/kitsune/LICENSE.md
      - install -Dm755 target/release/kitsune /app/share/kitsune/bin/kitsune
      - install -Dm755 target/release/kitsune-layer /app/share/kitsune/bin/kitsune-layer
      - |
        sed -i \
          -e '/^echo "\[i\] Building Rust renderer\.\.\."$/d' \
          -e '/^cargo build --release --locked --bins$/d' \
          -e '/^cargo build --release --bins$/d' \
          -e 's|\./target/release/kitsune-layer|"${KITSUNE_BIN_DIR:-./bin}"/kitsune-layer|g' \
          -e 's|\./target/release/kitsune|"${KITSUNE_BIN_DIR:-./bin}"/kitsune|g' \
          /app/share/kitsune/scripts/start.sh \
          /app/share/kitsune/scripts/kitsune.sh
      - sed -i -e '/^cargo build --release$/d' /app/share/kitsune/scripts/install.sh
      - |
        cat > /app/bin/kitsune <<'WRAP'
        #!/usr/bin/env bash
        set -euo pipefail
        system_home='/app/share/kitsune'
        user_home="${XDG_DATA_HOME:-$HOME/.local/share}/kitsune"
        if [[ ! -d "$user_home" ]]; then
          mkdir -p "$(dirname "$user_home")"
          cp -a "$system_home" "$user_home"
          chmod -R u+rwX "$user_home"
        fi
        exec "$user_home/scripts/kitsune.sh" "$@"
        WRAP
      - chmod 755 /app/bin/kitsune
    sources:
      - type: dir
        path: ../../Kitsune

  - name: kitsune-rendercore
    buildsystem: simple
    build-options:
      env:
        CARGO_NET_OFFLINE: "false"
    build-commands:
      - cargo build --release --locked --features wayland-layer
      - install -Dm755 target/release/kitsune-rendercore /app/bin/kitsune-rendercore
    sources:
      - type: dir
        path: ../../Kitsune-RenderCore

  - name: kitowall
    buildsystem: simple
    build-commands:
      - npm ci --offline --no-audit --progress=false
      - npm run build
      - cd ui && npm ci --offline --no-audit --progress=false
      - cd ui && npm run build
      - mkdir -p ui/src-tauri/.cargo
      - |
        cat > ui/src-tauri/.cargo/config.toml << 'EOC'
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "../../cargo/vendor"
        EOC
      - cd ui && npm exec -- tauri build --no-bundle
      - install -Dm755 ui/src-tauri/target/release/kitowall-ui /app/bin/kitowall-ui
      - install -Dm644 io.kitotsu.KitoWall.desktop /app/share/applications/io.kitotsu.KitoWall.desktop
      - install -Dm644 io.kitotsu.KitoWall.metainfo.xml /app/share/metainfo/io.kitotsu.KitoWall.metainfo.xml
      - install -Dm644 io.kitotsu.KitoWall-64.png /app/share/icons/hicolor/64x64/apps/io.kitotsu.KitoWall.png
      - install -Dm644 io.kitotsu.KitoWall-128.png /app/share/icons/hicolor/128x128/apps/io.kitotsu.KitoWall.png
      - install -Dm644 io.kitotsu.KitoWall-256.png /app/share/icons/hicolor/256x256/apps/io.kitotsu.KitoWall.png
    sources:
      - type: dir
        path: ..
      - type: file
        path: io.kitotsu.KitoWall.desktop
      - type: file
        path: io.kitotsu.KitoWall.metainfo.xml
      - type: file
        path: io.kitotsu.KitoWall-64.png
      - type: file
        path: io.kitotsu.KitoWall-128.png
      - type: file
        path: io.kitotsu.KitoWall-256.png
      - generated-sources/node-deps-root.json
      - generated-sources/node-deps-ui.json
      - generated-sources/cargo-deps.json
      - type: file
        path: generated-sources/ui-package-lock.json
        dest: ui
        dest-filename: package-lock.json
